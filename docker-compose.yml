# PostgreSQL para desenvolvimento local.
# Uso: copie .env.example para .env, ajuste as senhas e rode: docker compose up -d
#
# Requer PostgreSQL 18+ para uuidv7() nas migrations (tabela users).
# Se você vinha da imagem 16 e o volume antigo causar erro, use: docker compose down -v
# (apaga dados locais) e suba de novo.

services:
  postgres:
    image: postgres:18-alpine
    container_name: jlturismo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jlturismo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jlturismo_dev}
      POSTGRES_DB: ${POSTGRES_DB:-jlturismo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jlturismo} -d ${POSTGRES_DB:-jlturismo}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
